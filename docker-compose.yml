services:
  # 1. The Redis Service for WebSockets & Caching
  redis:
    image: redis:7-alpine
    container_name: chat_api_redis
    ports:
      - "6379:6379"

  # 2. Your FastAPI Application Service
  web:
    build: .
    container_name: chat_api_web
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host.docker.internal:5432/${POSTGRES_DB}
    depends_on:
      - redis
