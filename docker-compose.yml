services:
  # 1. The Redis Service for WebSockets & Caching
  redis:
    image: redis:7-alpine
    container_name: chat_api_redis
    ports:
      - "6379:6379"

  # 2. Your FastAPI Application Service
  web:
    build: .
    container_name: chat_api_web
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      # We swapped 'localhost' with 'host.docker.internal' so Docker can talk to your database
      - DATABASE_URL=postgresql+asyncpg://postgres:6156@host.docker.internal:5432/chat_db
    depends_on:
      - redis
